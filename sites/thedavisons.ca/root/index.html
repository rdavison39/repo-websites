<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Davison - Florida | Heron's Glen</title>

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

<style>
  :root {
    --primary: #1a2b3c;
    --accent: #d4af37;
    --bg: #ffffff;
    --nav-font: 'Lato', sans-serif;
    --available-bg: #2ecc71;
    --booked-bg: #e74c3c;    
    --radius: 12px;
  }
 
  body { margin: 0; font-family: 'Lato', sans-serif; color: #2c2c2c; background-color: var(--bg); overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
  h2 { font-family: 'Playfair Display', serif; color: var(--primary); text-align: center; margin-top: 30px; margin-bottom: 20px; }

  /* --- Hero Section (narrower, blurred) --- */
  .hero-banner {
    height: 22vh; /* narrower than before */
    min-height: 140px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .hero-banner::before {
    content: "";
    position: absolute;
    inset: -12px;
    background: url('../images/property/Florida-082.jpg') center 35% / cover no-repeat;
    filter: blur(8px);
    transform: scale(1.08);
    z-index: 0;
  }
  .hero-banner::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.7));
    z-index: 1;
  }
  .hero-banner h1 {
    position: relative;
    z-index: 2;
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.7rem, 5vw, 2.6rem);
    text-shadow: 2px 4px 15px rgba(0,0,0,0.7);
    text-align: center;
    padding: 0 20px;
    margin: 0;
  }

  /* --- Navbar --- */
  .navbar {
    background: white;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }
  .navbar button {
    background: none; border: none; color: var(--primary);
    padding: 15px 20px;
    font-family: var(--nav-font); font-size: 13px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
    border-bottom: 3px solid transparent;
  }
  .navbar button.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

  /* --- Property Icons Bar --- */
  .property-bar {
    display: flex;
    justify-content: space-around;
    background: white;
    padding: 20px 10px;
    margin: 20px auto;
    border-radius: var(--radius);
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    max-width: 800px;
  }
  .feat-item { text-align: center; flex: 1; }
  .feat-item i { display: block; color: var(--accent); font-size: 28px; margin-bottom: 5px; }
  .feat-item span { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #999; display: block; }
  .feat-item p { margin: 2px 0 0; font-weight: 700; font-size: 1.1rem; color: var(--primary); }

  /* --- Container & Sections --- */
  .container { max-width: 1100px; margin: auto; padding: 10px; }
  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* --- Gallery Slider --- */
  .gallery-box {
    position: relative;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    touch-action: pan-y;
  }
  .slider-track {
    display: flex;
    width: 100%;
    height: 380px;
    will-change: transform;
    cursor: grab;
    transform: translate3d(0, 0, 0);
    transition: transform 0.45s cubic-bezier(0.2, 0, 0.2, 1);
  }
  .slider-track.dragging {
    transition: none;
  }
  .slider-track:active { cursor: grabbing; }
  .slide {
    flex: 0 0 100%;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .slide img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }
 
  .arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.25); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: white; border: none;
    width: 48px; height: 48px; cursor: pointer; z-index: 5; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    transition: 0.2s;
  }
  .arrow:hover { background: rgba(255,255,255,0.45); }
  .arrow-left { left: 15px; }
  .arrow-right { right: 15px; }

  /* --- Calendar --- */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 30px;
    padding: 20px 0;
  }
  .month-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    border: 1px solid #eee;
  }
  .month-card strong {
    display: block;
    text-align: center;
    margin-bottom: 15px;
    font-size: 1.2rem;
    color: var(--primary);
  }
  .cal-body {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    text-align: center;
  }
  .cal-header-day { font-size: 0.7rem; font-weight: bold; color: #999; text-transform: uppercase; margin-bottom: 5px; }
  .cal-day {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    border-radius: 4px;
    font-weight: 500;
  }
  .cal-day.avail { background-color: var(--available-bg); color: white; }
  .cal-day.booked { background-color: var(--booked-bg); color: white; text-decoration: line-through; opacity: 0.8; }
  .cal-day.empty { background: transparent; }

  .calendar-legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: bold; }
  .legend-box { width: 18px; height: 18px; border-radius: 4px; }

  /* --- Thumbs --- */
  .thumbs-container {
    display: flex; gap: 10px; overflow-x: auto; margin: 15px 0;
    padding-bottom: 10px; scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .thumbs-container::-webkit-scrollbar { display: none; }
  .thumb-item { flex: 0 0 100px; height: 65px; cursor: pointer; opacity: 0.4; transition: 0.3s; border: 2px solid transparent; border-radius: 6px; overflow: hidden; }
  .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-item.active { opacity: 1; border-color: var(--accent); transform: scale(1.05); }

  /* --- Contact Form --- */
  .contact-card {
    background: white;
    max-width: 600px;
    margin: 40px auto;
    padding: 40px;
    border-radius: var(--radius);
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
  }
  .form-group { margin-bottom: 20px; text-align: left; }
  .form-group label { display: block; font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: #777; }
  .form-group input, .form-group textarea {
    width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 1rem; box-sizing: border-box;
  }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1); }
  .submit-btn {
    width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 6px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s;
  }
  .submit-btn:hover { background: var(--accent); }
 
  .success-msg { display: none; text-align: center; padding: 20px; color: #2e7d32; }

  /* --- Fullscreen --- */
  .fullscreen {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95);
    display: none; align-items: center; justify-content: center;
    z-index: 9999;
    touch-action: pan-x pan-y pinch-zoom;
  }
  .fullscreen img { max-width: 100%; max-height: 100%; object-fit: contain; }

  @media (min-width: 768px) {
    .slider-track { height: 600px; }
    .thumb-item { flex: 0 0 140px; height: 90px; }
  }
</style>
</head>
<body>

WWW.THEDAVISONS.CA
</body>
</html>
